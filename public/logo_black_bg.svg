<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Solid Black Background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Outer glowing circle to frame the aperture with elegant padding -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.15"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ffffff" stroke-width="12"/>

  <!-- Centered White Aperture (Camera Shutter) blades -->
  <g fill="#ffffff" stroke="#000000" stroke-width="8" stroke-linejoin="round">
    <!-- Blade 1 -->
    <path d="M 256 96 C 310 96, 350 120, 380 160 L 256 220 Z"/>
    <!-- Blade 2 -->
    <path d="M 380 160 C 410 210, 416 260, 396 316 L 285 240 Z"/>
    <!-- Blade 3 -->
    <path d="M 396 316 C 376 370, 340 400, 290 416 L 240 290 Z"/>
    <!-- Blade 4 -->
    <path d="M 290 416 C 236 416, 196 392, 166 352 L 256 280 Z"/>
    <!-- Blade 5 -->
    <path d="M 166 352 C 136 302, 130 252, 150 196 L 261 260 Z"/>
    <!-- Blade 6 -->
    <path d="M 150 196 C 170 142, 206 112, 256 96 L 272 210 Z"/>
  </g>
  
  <!-- Central lens core -->
  <circle cx="256" cy="256" r="50" fill="#000000" stroke="#ffffff" stroke-width="6"/>
  <circle cx="270" cy="242" r="12" fill="#ffffff" opacity="0.8"/>
</svg>
